name: blueprint

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: blueprint
      POSTGRES_PASSWORD: blueprint
      POSTGRES_DB: blueprint
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, retries: 10 }

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment: { MINIO_ROOT_USER: blueprint, MINIO_ROOT_PASSWORD: blueprint123 }
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  minio-init: # cria o bucket e publica o pacote de corpus de exemplo (contrato §8.1)
    image: minio/mc
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 blueprint blueprint123 &&
      mc mb -p local/blueprint-local &&
      mc cp --recursive /corpus-example/ local/blueprint-local/corpus/releases/2026.07.14/ &&
      exit 0"
    volumes: ["./corpus-example:/corpus-example:ro"]

  api:
    build: { context: ./apps/api }
    command: uvicorn blueprint.main:app --host 0.0.0.0 --port 8000 --reload
    environment: &appenv
      ENV: local
      DATABASE_URL: postgresql+asyncpg://blueprint:blueprint@postgres:5432/blueprint
      REDIS_URL: redis://redis:6379/0
      S3_BUCKET: blueprint-local
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: blueprint
      AWS_SECRET_ACCESS_KEY: blueprint123
      LLM_PROVIDER: mock # decisão do MVP: nenhuma chamada real de LLM
      AUTH_MODE: stub # stub por e-mail — recusado pelo app fora de ENV=local
    ports: ["8000:8000"]
    volumes:
      - ./apps/api/src:/app/src # hot reload
      - ./apps/api/migrations:/app/migrations
      - ./apps/api/fixtures:/app/fixtures
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: { context: ./apps/api }
    command: arq blueprint.worker.WorkerSettings --watch /app/src
    environment: *appenv
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/fixtures:/app/fixtures
    depends_on: [api]

  web:
    image: node:22-slim
    working_dir: /app
    # corepack lê a versão do campo packageManager do package.json (pnpm 11 fixado)
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment: { VITE_API_PROXY: "http://api:8000" }
    ports: ["5173:5173"]
    volumes: ["./apps/web:/app", "webmodules:/app/node_modules"]
    depends_on: [api]

volumes: { pgdata: {}, miniodata: {}, webmodules: {} }
